<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Local Marketplace</title>
    <style>
        /* Base Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; text-align: center; }
        .view { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Login Styles */
        .login-box, .payment-box { background: white; padding: 30px; border-radius: 10px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { display: block; width: 250px; padding: 10px; margin: 10px auto; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Product Styles */
        .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; border-radius: 8px; width: 200px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; background: #eee; }
        
        /* Buttons */
        button, .nav-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #218838; }
        .cart-btn { background: #ff9800; text-decoration: none; margin: 20px; display: inline-block; }
        
        /* Cart List */
        .cart-item { display: flex; justify-content: space-between; max-width: 400px; margin: 10px auto; background: white; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="loginView" class="view active">
        <div class="login-box">
            <h2>Smart Marketplace Login</h2>
            <input type="text" id="username" placeholder="Username (type anything)">
            <input type="password" id="password" placeholder="Password">
            <button onclick="showView('homeView')">Login</button>
        </div>
    </div>

    <div id="homeView" class="view">
        <h1>Fresh Local Products</h1>
        <div class="products">
            <div class="card">
                <img src="https://via.placeholder.com/150?text=Apples" alt="Apples">
                <h3>Fresh Apples</h3>
                <p>₹100 / kg</p>
                <button onclick="addToCart('Fresh Apples', 100)">Add to Cart</button>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150?text=Honey" alt="Honey">
                <h3>Organic Honey</h3>
                <p>₹250</p>
                <button onclick="addToCart('Organic Honey', 250)">Add to Cart</button>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150?text=Handicraft" alt="Handicraft">
                <h3>Handicraft</h3>
                <p>₹500</p>
                <button onclick="addToCart('Handicraft Item', 500)">Add to Cart</button>
            </div>
        </div>
        <button class="nav-btn cart-btn" onclick="renderCart()">Go To Cart</button>
    </div>

    <div id="cartView" class="view">
        <h2>Your Selected Items</h2>
        <div id="cartItems"></div>
        <h3 id="totalDisplay"></h3>
        <button onclick="showView('homeView')">Continue Shopping</button>
        <button class="nav-btn" onclick="showView('paymentView')">Proceed to Payment</button>
    </div>

    <div id="paymentView" class="view">
        <div class="payment-box">
            <h2>Secure Payment</h2>
            <input type="text" placeholder="Card Number (16 digits)">
            <input type="text" placeholder="CVV">
            <button onclick="processPayment()">Pay Now</button>
        </div>
    </div>

    <script>
        let cart = [];

        // Function to switch views
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
        }

        // Add to Cart Logic
        function addToCart(name, price) {
            cart.push({ name, price });
            alert(name + " added!");
        }

        // Render Cart Items
        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalDisplay = document.getElementById('totalDisplay');
            container.innerHTML = "";
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p>Your cart is empty!</p>";
            } else {
                cart.forEach(item => {
                    container.innerHTML += `
                        <div class="cart-item">
                            <span>${item.name}</span>
                            <span>₹${item.price}</span>
                        </div>`;
                    total += item.price;
                });
            }
            totalDisplay.innerText = "Total: ₹" + total;
            showView('cartView');
        }

        // Payment Logic
        function processPayment() {
            alert("Payment Successful! Order sent to vendor.");
            cart = []; // Empty the cart
            showView('homeView');
        }
    </script>
</body>
</html>
